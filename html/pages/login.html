<!-- login.html -->
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - PalPets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="../index.html" class="logo">
          <img src="../images/logo.png" alt="PalPets" />
        </a>
        <div class="nav-menu">
          <a href="../index.html">الرئيسية</a>
          <a href="pets.html">الحيوانات</a>
          <a href="adoption.html">التبني</a>
          <a href="lost-found.html">مفقود ومعثور</a>
          <a href="veterinary.html">الرعاية البيطرية</a>
          <a href="store.html">المتجر</a>
        </div>
        <div class="auth-buttons"></div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </nav>

    <section class="login-section">
      <div class="login-card">
        <h2 class="login-title">تسجيل الدخول</h2>
        <div id="messageContainer"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">اسم المستخدم</label>
            <input type="text" id="username" class="form-input" required />
          </div>
          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-input" required />
          </div>
          <button type="submit" class="btn-submit">تسجيل الدخول</button>
        </form>

        <div class="login-footer">
          <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
          <p><a href="forgot-password.html">نسيت كلمة المرور؟</a></p>
        </div>
      </div>
    </section>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
