<!-- register.html -->
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب - PalPets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="../index.html" class="logo">
          <img src="../images/logo.png" alt="PalPets" />
        </a>
        <div class="nav-menu">
          <a href="../index.html">الرئيسية</a>
          <a href="pets.html">الحيوانات</a>
          <a href="adoption.html">التبني</a>
          <a href="lost-found.html">مفقود ومعثور</a>
          <a href="veterinary.html">الرعاية البيطرية</a>
          <a href="store.html">المتجر</a>
        </div>
        <div class="auth-buttons"></div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </nav>

    <section class="login-section">
      <div class="login-card">
        <h2 class="login-title">إنشاء حساب جديد</h2>
        <div id="messageContainer"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">الاسم الأول</label>
              <input type="text" id="firstName" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">الاسم الأخير</label>
              <input type="text" id="lastName" class="form-input" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">اسم المستخدم</label>
            <input type="text" id="username" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label">رقم الهاتف</label>
            <input type="tel" id="phone" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label">الموقع</label>
            <input
              type="text"
              id="location"
              class="form-input"
              placeholder="المدينة"
            />
          </div>

          <div class="form-group">
            <label class="form-label">نوع الحساب</label>
            <select id="userType" class="form-input">
              <option value="regular">مستخدم عادي</option>
              <option value="breeder">مربي</option>
              <option value="veterinarian">طبيب بيطري</option>
              <option value="clinic">عيادة</option>
              <option value="shelter">ملجأ</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-input" required />
          </div>

          <div class="form-group">
            <label class="form-label">تأكيد كلمة المرور</label>
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              required
            />
          </div>

          <button type="submit" class="btn-submit">إنشاء حساب</button>
        </form>

        <div class="login-footer">
          <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
      </div>
    </section>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
