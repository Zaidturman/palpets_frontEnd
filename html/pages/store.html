<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>متجر المستلزمات - PalPets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .product-card {
        background: white;
        border-radius: 0.5rem;
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: transform 0.3s;
        position: relative;
      }
      .product-card:hover {
        transform: translateY(-5px);
      }
      .product-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }
      .product-sale-badge {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: #ef4444;
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 600;
        z-index: 1;
      }
      .product-info {
        padding: 1.5rem;
      }
      .product-category {
        color: var(--primary-color);
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
      }
      .product-name {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .product-price {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--primary-color);
      }
      .product-old-price {
        font-size: 0.875rem;
        color: var(--text-light);
        text-decoration: line-through;
        margin-right: 0.5rem;
      }
      .product-rating {
        color: #fbbf24;
        margin: 0.5rem 0;
      }
      .category-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin: 2rem 0;
      }
      .category-tab {
        padding: 0.5rem 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 9999px;
        cursor: pointer;
        transition: all 0.3s;
        background: white;
      }
      .category-tab:hover,
      .category-tab.active {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
      }
      .cart-sidebar {
        position: fixed;
        top: 0;
        left: -400px;
        width: 400px;
        height: 100vh;
        background: white;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
        transition: left 0.3s;
        z-index: 1000;
        padding: 2rem;
        overflow-y: auto;
      }
      .cart-sidebar.open {
        left: 0;
      }
      .cart-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 999;
      }
      .cart-overlay.active {
        display: block;
      }
      .cart-icon {
        position: fixed;
        bottom: 2rem;
        left: 2rem;
        background: var(--primary-color);
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        z-index: 99;
      }
      .cart-count {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #ef4444;
        color: white;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
      }
      .cart-item {
        display: flex;
        gap: 1rem;
        padding: 1rem 0;
        border-bottom: 1px solid #e5e7eb;
      }
      .cart-item-image {
        width: 60px;
        height: 60px;
        border-radius: 0.5rem;
        object-fit: cover;
      }
      .quantity-btn {
        width: 24px;
        height: 24px;
        border: 1px solid #e5e7eb;
        background: white;
        border-radius: 4px;
        cursor: pointer;
      }
      @media (max-width: 640px) {
        .cart-sidebar {
          width: 100%;
          left: -100%;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="../index.html" class="logo">
          <img src="../images/logo.png" alt="PalPets" />
        </a>
        <div class="nav-menu">
          <a href="../index.html">الرئيسية</a>
          <a href="pets.html">الحيوانات</a>
          <a href="adoption.html">التبني</a>
          <a href="lost-found.html">مفقود ومعثور</a>
          <a href="veterinary.html">الرعاية البيطرية</a>
          <a href="store.html" class="active">المتجر</a>
        </div>
        <div class="auth-buttons"></div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </nav>

    <!-- Hero -->
    <section
      class="hero"
      style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%)"
    >
      <div class="container">
        <div class="hero-content">
          <h2>متجر مستلزمات الحيوانات</h2>
          <p>كل ما تحتاجه لحيوانك الأليف في مكان واحد</p>
        </div>
      </div>
    </section>

    <!-- Categories -->
    <section class="services" style="padding-top: 2rem">
      <div class="container">
        <div class="category-tabs" id="categoryTabs">
          <button class="category-tab active" onclick="filterProducts('all')">
            الكل
          </button>
        </div>

        <!-- Search and Filters -->
        <div class="search-card">
          <div class="search-grid">
            <input
              type="text"
              id="searchInput"
              placeholder="ابحث عن منتج..."
              class="search-input"
            />

            <select id="sortFilter" class="search-input">
              <option value="">ترتيب حسب</option>
              <option value="price-asc">السعر: من الأقل للأعلى</option>
              <option value="price-desc">السعر: من الأعلى للأقل</option>
              <option value="rating">التقييم</option>
              <option value="newest">الأحدث</option>
            </select>

            <select id="priceFilter" class="search-input">
              <option value="">جميع الأسعار</option>
              <option value="0-50">أقل من 50 ₪</option>
              <option value="50-100">50 - 100 ₪</option>
              <option value="100-200">100 - 200 ₪</option>
              <option value="200+">أكثر من 200 ₪</option>
            </select>

            <select id="petTypeFilter" class="search-input">
              <option value="">جميع الحيوانات</option>
              <option value="dog">كلاب</option>
              <option value="cat">قطط</option>
              <option value="bird">طيور</option>
            </select>
          </div>
        </div>

        <!-- Products Grid -->
        <div
          id="productsGrid"
          class="services-grid"
          style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr))"
        ></div>

        <!-- Loading -->
        <div id="loading" class="spinner" style="display: none"></div>

        <!-- Pagination -->
        <div id="pagination" class="pagination">
          <button class="btn-prev" onclick="prevPage()" id="prevBtn">
            <i class="fas fa-chevron-right"></i>
          </button>
          <span id="pageInfo">صفحة 1 من 1</span>
          <button class="btn-next" onclick="nextPage()" id="nextBtn">
            <i class="fas fa-chevron-left"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
      <div
        class="cart-header"
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 2rem;
        "
      >
        <h2>سلة التسوق</h2>
        <button
          onclick="toggleCart()"
          style="background: none; border: none; font-size: 1.5rem"
        >
          ✕
        </button>
      </div>
      <div id="cartItems"></div>
      <div
        class="cart-total"
        id="cartTotal"
        style="font-size: 1.25rem; font-weight: bold; margin: 1rem 0"
      ></div>
      <button class="btn-submit" onclick="checkout()" style="width: 100%">
        إتمام الشراء
      </button>
    </div>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="toggleCart()">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
      <div class="modal-content" style="max-width: 800px">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="productDetails"></div>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
      let currentPage = 1;
      let totalPages = 1;
      let categories = [];
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      let currentProducts = [];

      // Load categories
      async function loadCategories() {
        try {
          const response = await apiCall(
            "/store/categories/",
            "GET",
            null,
            false,
          );
          categories = response.results || response || [];

          const tabs = document.getElementById("categoryTabs");
          tabs.innerHTML =
            '<button class="category-tab active" onclick="filterProducts(\'all\')">الكل</button>' +
            categories
              .map(
                (c) =>
                  `<button class="category-tab" onclick="filterProducts(${c.id})">${c.name}</button>`,
              )
              .join("");
        } catch (error) {
          console.error("Error loading categories:", error);
        }
      }

      // Load products
      async function loadProducts() {
        showLoading();

        try {
          const category =
            document
              .querySelector(".category-tab.active")
              ?.getAttribute("onclick")
              ?.match(/\d+/)?.[0] || "";
          const search = document.getElementById("searchInput").value;
          const sort = document.getElementById("sortFilter").value;
          const price = document.getElementById("priceFilter").value;
          const petType = document.getElementById("petTypeFilter").value;

          let url = `/store/?page=${currentPage}`;
          if (category) url += `&category=${category}`;
          if (search) url += `&search=${search}`;
          if (petType) url += `&pet_type=${petType}`;

          // Price filter
          if (price) {
            const [min, max] = price.split("-");
            if (max) {
              url += `&min_price=${min}&max_price=${max}`;
            } else if (price === "200+") {
              url += `&min_price=200`;
            }
          }

          const response = await apiCall(url, "GET", null, false);

          currentProducts = response.results || response || [];
          totalPages = Math.ceil(
            (response.count || currentProducts.length) / 10,
          );

          displayProducts(currentProducts);
          updatePagination();
        } catch (error) {
          console.error("Error loading products:", error);
        } finally {
          hideLoading();
        }
      }

      // Display products
      function displayProducts(products) {
        const grid = document.getElementById("productsGrid");

        if (products.length === 0) {
          grid.innerHTML = '<p class="text-center">لا توجد منتجات متاحة</p>';
          return;
        }

        grid.innerHTML = products
          .map((product) => {
            const finalPrice = product.discount_price || product.price;
            const discount = product.discount_price
              ? Math.round(
                  ((product.price - product.discount_price) / product.price) *
                    100,
                )
              : 0;

            return `
                    <div class="product-card">
                        ${discount > 0 ? `<span class="product-sale-badge">-${discount}%</span>` : ""}
                        <img src="${product.primary_image || "https://via.placeholder.com/300x200"}" alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <div class="product-category">${product.category_name || "عام"}</div>
                            <h3 class="product-name">${product.name}</h3>
                            
                            <div class="product-rating">
                                ${getStars(product.average_rating || 0)}
                                <span>(${product.reviews_count || 0})</span>
                            </div>
                            
                            <div class="product-price">
                                ${finalPrice} ₪
                                ${product.discount_price ? `<span class="product-old-price">${product.price} ₪</span>` : ""}
                            </div>
                            
                            <p style="color: var(--text-light); font-size: 0.875rem; margin: 0.5rem 0;">
                                ${product.short_description || product.description?.substring(0, 100) + "..."}
                            </p>
                            
                            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                                <button onclick="addToCart(${product.id})" class="btn-details" style="flex: 1;">
                                    🛒 أضف للسلة
                                </button>
                                <button onclick="viewProduct(${product.id})" class="btn-contact" style="flex: 1;">
                                    تفاصيل
                                </button>
                            </div>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      // Generate stars
      function getStars(rating) {
        let stars = "";
        for (let i = 1; i <= 5; i++) {
          if (i <= Math.floor(rating)) {
            stars += "★";
          } else if (i - 0.5 <= rating) {
            stars += "½";
          } else {
            stars += "☆";
          }
        }
        return stars;
      }

      // Filter products
      function filterProducts(category) {
        document
          .querySelectorAll(".category-tab")
          .forEach((tab) => tab.classList.remove("active"));
        event.target.classList.add("active");
        currentPage = 1;
        loadProducts();
      }

      // View product details
      async function viewProduct(id) {
        showLoading();

        try {
          const product = await apiCall(`/store/${id}/`, "GET", null, false);

          const modal = document.getElementById("productModal");
          const details = document.getElementById("productDetails");

          details.innerHTML = `
                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1;">
                            <img src="${product.primary_image || "https://via.placeholder.com/400"}" style="width: 100%; border-radius: 10px;">
                        </div>
                        <div style="flex: 1;">
                            <h2>${product.name}</h2>
                            <p>${product.description}</p>
                            
                            <table class="details-table">
                                <tr><th>السعر:</th><td>${product.final_price} ₪ ${product.discount_price ? `<span style="text-decoration: line-through; color: #999;">${product.price} ₪</span>` : ""}</td></tr>
                                <tr><th>التصنيف:</th><td>${product.category_name}</td></tr>
                                <tr><th>العلامة التجارية:</th><td>${product.brand || "غير محدد"}</td></tr>
                                <tr><th>الكمية المتوفرة:</th><td>${product.quantity}</td></tr>
                                <tr><th>التقييم:</th><td>${getStars(product.average_rating || 0)} (${product.reviews_count || 0} تقييم)</td></tr>
                            </table>
                            
                            <div style="margin-top: 20px;">
                                <button class="btn-primary" onclick="addToCart(${product.id})">🛒 أضف للسلة</button>
                                <button class="btn-secondary" onclick="addToWishlist(${product.id})">❤️ أضف للمفضلة</button>
                            </div>
                        </div>
                    </div>
                `;

          modal.style.display = "block";
        } catch (error) {
          showNotification("حدث خطأ في تحميل التفاصيل", "error");
        } finally {
          hideLoading();
        }
      }

      // Add to cart
      function addToCart(productId) {
        const product = currentProducts.find((p) => p.id === productId);
        if (!product) return;

        const existingItem = cart.find((item) => item.id === productId);

        if (existingItem) {
          existingItem.quantity += 1;
        } else {
          cart.push({
            id: product.id,
            name: product.name,
            price: product.discount_price || product.price,
            image: product.primary_image,
            quantity: 1,
          });
        }

        updateCart();
        showNotification("تمت إضافة المنتج إلى السلة");
      }

      // Update cart
      function updateCart() {
        localStorage.setItem("cart", JSON.stringify(cart));

        const cartItems = document.getElementById("cartItems");
        const cartCount = document.getElementById("cartCount");
        const cartTotal = document.getElementById("cartTotal");

        if (cart.length === 0) {
          cartItems.innerHTML = '<p class="text-center">السلة فارغة</p>';
          cartCount.textContent = "0";
          cartTotal.innerHTML = "الإجمالي: 0 ₪";
          return;
        }

        let total = 0;
        let itemCount = 0;

        cartItems.innerHTML = cart
          .map((item) => {
            total += item.price * item.quantity;
            itemCount += item.quantity;

            return `
                    <div class="cart-item">
                        <img src="${item.image || "https://via.placeholder.com/60"}" class="cart-item-image">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ₪</div>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                <button class="quantity-btn" onclick="removeFromCart(${item.id})" style="color: #ef4444;">✕</button>
                            </div>
                        </div>
                    </div>
                `;
          })
          .join("");

        cartCount.textContent = itemCount;
        cartTotal.innerHTML = `الإجمالي: ${total} ₪`;
      }

      // Update quantity
      function updateQuantity(productId, newQuantity) {
        if (newQuantity < 1) {
          removeFromCart(productId);
          return;
        }

        const item = cart.find((item) => item.id === productId);
        if (item) {
          item.quantity = newQuantity;
          updateCart();
        }
      }

      // Remove from cart
      function removeFromCart(productId) {
        cart = cart.filter((item) => item.id !== productId);
        updateCart();
        showNotification("تم حذف المنتج من السلة");
      }

      // Toggle cart
      function toggleCart() {
        document.getElementById("cartSidebar").classList.toggle("open");
        document.getElementById("cartOverlay").classList.toggle("active");
      }

      // Checkout
      function checkout() {
        if (!requireAuth()) return;

        if (cart.length === 0) {
          alert("السلة فارغة");
          return;
        }

        // TODO: Redirect to checkout page
        alert("سيتم تحويلك إلى صفحة إتمام الطلب");
      }

      // Pagination
      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          loadProducts();
        }
      }

      function nextPage() {
        if (currentPage < totalPages) {
          currentPage++;
          loadProducts();
        }
      }

      function updatePagination() {
        document.getElementById("pageInfo").textContent =
          `صفحة ${currentPage} من ${totalPages}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled =
          currentPage === totalPages;
      }

      function closeModal() {
        document.getElementById("productModal").style.display = "none";
      }

      // Event listeners
      document.getElementById("searchInput").addEventListener("input", () => {
        currentPage = 1;
        loadProducts();
      });

      document.getElementById("sortFilter").addEventListener("change", () => {
        currentPage = 1;
        loadProducts();
      });

      document.getElementById("priceFilter").addEventListener("change", () => {
        currentPage = 1;
        loadProducts();
      });

      document
        .getElementById("petTypeFilter")
        .addEventListener("change", () => {
          currentPage = 1;
          loadProducts();
        });

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        loadCategories();
        loadProducts();
        updateCart();
      });
    </script>
  </body>
</html>
