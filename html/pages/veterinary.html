<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الرعاية البيطرية - PalPets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .emergency-banner {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        padding: 1.5rem;
        border-radius: 0.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .emergency-number {
        font-size: 2rem;
        font-weight: bold;
      }
      .vaccination-schedule {
        background: white;
        padding: 2rem;
        border-radius: 0.5rem;
        box-shadow: var(--shadow);
      }
      .schedule-table {
        width: 100%;
        border-collapse: collapse;
      }
      .schedule-table th {
        background: var(--primary-color);
        color: white;
        padding: 1rem;
      }
      .schedule-table td {
        padding: 0.75rem;
        border-bottom: 1px solid #e5e7eb;
      }
      .clinic-card {
        background: white;
        border-radius: 0.5rem;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .clinic-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }
      .clinic-info {
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="../index.html" class="logo">
          <img src="../images/logo.png" alt="PalPets" />
        </a>
        <div class="nav-menu">
          <a href="../index.html">الرئيسية</a>
          <a href="pets.html">الحيوانات</a>
          <a href="adoption.html">التبني</a>
          <a href="lost-found.html">مفقود ومعثور</a>
          <a href="veterinary.html" class="active">الرعاية البيطرية</a>
          <a href="store.html">المتجر</a>
        </div>
        <div class="auth-buttons"></div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </nav>

    <!-- Hero -->
    <section
      class="hero"
      style="background: linear-gradient(135deg, #10b981 0%, #059669 100%)"
    >
      <div class="container">
        <div class="hero-content">
          <h2>الرعاية البيطرية</h2>
          <p>أفضل الأطباء والعيادات البيطرية لرعاية حيوانك الأليف</p>
        </div>
      </div>
    </section>

    <!-- Emergency -->
    <div class="container">
      <div class="emergency-banner">
        <div>
          <h3>🚨 طوارئ بيطرية 24/7</h3>
          <p>خدمة الطوارئ متاحة على مدار الساعة</p>
        </div>
        <div class="emergency-number">📞 920012345</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="container">
      <div class="tabs">
        <button class="tab active" onclick="showTab('clinics')">
          العيادات
        </button>
        <button class="tab" onclick="showTab('doctors')">الأطباء</button>
        <button class="tab" onclick="showTab('appointments')">المواعيد</button>
      </div>
    </div>

    <!-- Clinics Tab -->
    <div id="clinicsTab" class="tab-content active">
      <section class="services">
        <div class="container">
          <!-- Filters -->
          <div class="search-card">
            <div class="search-grid">
              <input
                type="text"
                id="clinicSearch"
                placeholder="ابحث عن عيادة..."
                class="search-input"
              />
              <select id="cityFilter" class="search-input">
                <option value="">جميع المدن</option>
              </select>
              <select id="specialtyFilter" class="search-input">
                <option value="">جميع التخصصات</option>
              </select>
              <button class="btn-primary" onclick="loadClinics()">بحث</button>
            </div>
          </div>

          <!-- Clinics Grid -->
          <div id="clinicsGrid" class="services-grid"></div>
        </div>
      </section>
    </div>

    <!-- Doctors Tab -->
    <div id="doctorsTab" class="tab-content">
      <section class="services">
        <div class="container">
          <div id="doctorsGrid" class="services-grid"></div>
        </div>
      </section>
    </div>

    <!-- Appointments Tab -->
    <div id="appointmentsTab" class="tab-content">
      <section class="services">
        <div class="container">
          <div class="form-card">
            <h3>حجز موعد</h3>
            <form id="appointmentForm" onsubmit="bookAppointment(event)">
              <div class="form-row">
                <div class="form-group">
                  <label>العيادة</label>
                  <select id="appClinic" class="form-input" required></select>
                </div>
                <div class="form-group">
                  <label>الطبيب</label>
                  <select id="appDoctor" class="form-input" required></select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>الخدمة</label>
                  <select id="appService" class="form-input" required></select>
                </div>
                <div class="form-group">
                  <label>اسم الحيوان</label>
                  <input
                    type="text"
                    id="appPetName"
                    class="form-input"
                    required
                  />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>التاريخ</label>
                  <input type="date" id="appDate" class="form-input" required />
                </div>
                <div class="form-group">
                  <label>الوقت</label>
                  <input type="time" id="appTime" class="form-input" required />
                </div>
              </div>
              <button type="submit" class="btn-submit">حجز الموعد</button>
            </form>
          </div>

          <div id="userAppointments"></div>
        </div>
      </section>
    </div>

    <!-- Vaccination Schedule -->
    <section class="services" style="background-color: white">
      <div class="container">
        <h2 class="section-title">جدول التطعيمات الأساسية</h2>
        <div class="vaccination-schedule">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>العمر</th>
                <th>الكلاب</th>
                <th>القطط</th>
              </tr>
            </thead>
            <tbody id="vaccinationTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script src="../js/api.js"></script>
    <script>
      let currentTab = "clinics";
      let cities = [];

      // Show tab
      function showTab(tab) {
        currentTab = tab;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        event.target.classList.add("active");
        document.getElementById(tab + "Tab").classList.add("active");

        if (tab === "clinics") loadClinics();
        if (tab === "doctors") loadDoctors();
        if (tab === "appointments") {
          loadClinicsForAppointment();
          if (getToken()) loadUserAppointments();
        }
      }

      // Load clinics
      async function loadClinics() {
        showLoading();

        try {
          const search = document.getElementById("clinicSearch")?.value || "";
          const city = document.getElementById("cityFilter")?.value || "";

          let url = "/veterinary/clinics/";
          const params = new URLSearchParams();
          if (search) params.append("search", search);
          if (city) params.append("city", city);
          if (params.toString()) url += "?" + params.toString();

          const response = await apiCall(url, "GET", null, false);
          const clinics = response.results || response || [];

          displayClinics(clinics);
          extractCities(clinics);
        } catch (error) {
          console.error("Error loading clinics:", error);
        } finally {
          hideLoading();
        }
      }

      // Display clinics
      function displayClinics(clinics) {
        const grid = document.getElementById("clinicsGrid");

        grid.innerHTML = clinics
          .map(
            (clinic) => `
                <div class="clinic-card">
                    <img src="${clinic.logo || "https://via.placeholder.com/400x200"}" class="clinic-image">
                    <div class="clinic-info">
                        <h3>${clinic.name}</h3>
                        <p>⭐ ${clinic.rating || 0} (${clinic.reviews_count || 0} تقييم)</p>
                        <p>📍 ${clinic.city} - ${clinic.address}</p>
                        <p>📞 ${clinic.phone}</p>
                        ${clinic.emergency_service ? "<p>🚑 خدمة طوارئ 24/7</p>" : ""}
                        <button class="btn-details" onclick="viewClinic(${clinic.id})">عرض التفاصيل</button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // Extract cities for filter
      function extractCities(clinics) {
        cities = [...new Set(clinics.map((c) => c.city))];
        const select = document.getElementById("cityFilter");
        select.innerHTML =
          '<option value="">جميع المدن</option>' +
          cities.map((c) => `<option value="${c}">${c}</option>`).join("");
      }

      // Load doctors
      async function loadDoctors() {
        showLoading();

        try {
          const response = await apiCall(
            "/veterinary/doctors/",
            "GET",
            null,
            false,
          );
          const doctors = response.results || response || [];

          displayDoctors(doctors);
        } catch (error) {
          console.error("Error loading doctors:", error);
        } finally {
          hideLoading();
        }
      }

      // Display doctors
      function displayDoctors(doctors) {
        const grid = document.getElementById("doctorsGrid");

        grid.innerHTML = doctors
          .map(
            (doc) => `
                <div class="service-card">
                    <img src="${doc.profile_image || "https://via.placeholder.com/200"}" 
                         style="width: 100%; height: 200px; object-fit: cover; border-radius: 0.5rem;">
                    <h3>د. ${doc.name}</h3>
                    <p>${doc.title}</p>
                    <p>⭐ ${doc.rating || 0} (${doc.reviews_count || 0} تقييم)</p>
                    <p>📞 ${doc.phone}</p>
                    <p>${doc.experience_years} سنوات خبرة</p>
                    <button class="btn-details" onclick="viewDoctor(${doc.id})">عرض التفاصيل</button>
                </div>
            `,
          )
          .join("");
      }

      // Load clinics for appointment
      async function loadClinicsForAppointment() {
        try {
          const response = await apiCall(
            "/veterinary/clinics/",
            "GET",
            null,
            false,
          );
          const clinics = response.results || response || [];

          const select = document.getElementById("appClinic");
          select.innerHTML =
            '<option value="">اختر العيادة</option>' +
            clinics
              .map((c) => `<option value="${c.id}">${c.name}</option>`)
              .join("");
        } catch (error) {
          console.error("Error loading clinics:", error);
        }
      }

      // Load doctors for selected clinic
      document
        .getElementById("appClinic")
        ?.addEventListener("change", async function (e) {
          if (e.target.value) {
            try {
              const response = await apiCall(
                `/veterinary/doctors/?clinic=${e.target.value}`,
                "GET",
                null,
                false,
              );
              const doctors = response.results || response || [];

              const select = document.getElementById("appDoctor");
              select.innerHTML =
                '<option value="">اختر الطبيب</option>' +
                doctors
                  .map((d) => `<option value="${d.id}">د. ${d.name}</option>`)
                  .join("");
            } catch (error) {
              console.error("Error loading doctors:", error);
            }
          }
        });

      // Book appointment
      async function bookAppointment(event) {
        event.preventDefault();
        if (!requireAuth()) return;

        const formData = {
          clinic: document.getElementById("appClinic").value,
          doctor: document.getElementById("appDoctor").value,
          service: document.getElementById("appService").value,
          pet_name: document.getElementById("appPetName").value,
          appointment_date: document.getElementById("appDate").value,
          appointment_time: document.getElementById("appTime").value,
        };

        showLoading();

        try {
          await apiCall("/veterinary/appointments/", "POST", formData);
          showNotification("تم حجز الموعد بنجاح", "success");
          loadUserAppointments();
        } catch (error) {
          showNotification(error.message || "حدث خطأ في الحجز", "error");
        } finally {
          hideLoading();
        }
      }

      // Load user appointments
      async function loadUserAppointments() {
        try {
          const response = await apiCall(
            "/veterinary/appointments/",
            "GET",
            null,
            false,
          );
          const appointments = response.results || response || [];

          displayUserAppointments(appointments);
        } catch (error) {
          console.error("Error loading appointments:", error);
        }
      }

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        loadClinics();
      });
    </script>
  </body>
</html>
